<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fidelity Wildcard Filter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(135deg, rgba(0,90,45,0.35) 0%, rgba(0,60,30,0.2) 100%);
    }

    .header img {
      width: 28px;
      height: 28px;
    }

    .header-text h1 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #ffffff;
    }

    .header-text p {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
    }

    /* ── Status badge ── */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .status-label {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    .status-badge.active {
      background: rgba(0, 160, 80, 0.2);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.3);
    }

    .status-badge.inactive {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* ── Actions ── */
    .actions {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.15s ease;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      background: linear-gradient(135deg, #006633 0%, #009944 100%);
      color: #ffffff;
      border: 1px solid rgba(0,200,80,0.3);
      box-shadow: 0 2px 8px rgba(0,153,68,0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #007a3d 0%, #00b352 100%);
      box-shadow: 0 4px 14px rgba(0,153,68,0.45);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(0,153,68,0.2);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.09);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.75);
    }

    /* ── Icon SVGs ── */
    .icon { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px 10px;
      text-align: center;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .footer a {
      color: rgba(0,200,80,0.5);
      text-decoration: none;
    }

    .footer a:hover { color: rgba(0,200,80,0.8); }

    /* ── Feedback flash ── */
    @keyframes fadeOut {
      0%   { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .flash {
      font-size: 11px;
      text-align: center;
      padding: 5px 0 0;
      color: #4ade80;
      animation: fadeOut 1.8s ease forwards;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="Fidelity Filter logo">
    <div class="header-text">
      <h1>Wildcard Filter</h1>
      <p>Fidelity Positions Overlay</p>
    </div>
  </div>

  <div class="status-row">
    <span class="status-label">Filter Status</span>
    <span class="status-badge inactive" id="status-badge">Checking…</span>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="relaunch-btn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Relaunch Filter
    </button>

    <button class="btn btn-secondary" id="close-btn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      Close Filter
    </button>

    <div id="feedback"></div>
  </div>

  <div class="footer">
    <a href="https://github.com/teeesss/fidelity_filter" target="_blank">View on GitHub</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
